<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firelight</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --night: #030611;
      --ink: #090816;
      --cream: #fff2ce;
      --ember: #ff7a18;
      --gold: #ffc640;
      --blue: #19324c;
      --pine: #0e2e2b;
      --moss: #31564a;
      --rust: #9e4f25;
      --pixel: "Press Start 2P", "Courier New", monospace;
      --readable-pixel: "VT323", "Courier New", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #000;
      color: var(--cream);
      overflow: hidden;
      font-family: var(--pixel);
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    .site {
      position: relative;
      width: 100vw;
      height: 100vh;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 70%, rgba(255, 123, 24, 0.18), transparent 22rem),
        linear-gradient(#050714 0%, #071120 52%, #0c1b1c 100%);
    }

    .scene-canvas,
    .fire-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .scene-canvas {
      z-index: 0;
      image-rendering: pixelated;
      opacity: 0;
      transform: scale(1.03);
      transition: opacity 1.2s ease, transform 1.8s ease;
    }

    body.home-ready .scene-canvas {
      opacity: 1;
      transform: scale(1);
    }

    .fire-canvas {
      z-index: 6;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.1s ease;
      mix-blend-mode: screen;
    }

    body.fire-lit .fire-canvas {
      opacity: 1;
    }

    body.intro-done .fire-canvas {
      z-index: 2;
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 84%, rgba(255, 125, 25, 0.2), transparent 15rem),
        radial-gradient(circle at 50% 55%, rgba(22, 36, 65, 0.18), transparent 34rem),
        #000;
      transform: translateY(0) scale(1);
      transition: opacity 900ms ease, visibility 900ms ease, transform 900ms ease;
    }

    body.intro-done .intro {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(2rem) scale(0.985);
    }

    .intro::before,
    .intro::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 900ms ease;
    }

    .intro::before {
      bottom: 0;
      height: 36vh;
      background:
        linear-gradient(transparent, rgba(0, 0, 0, 0.8)),
        repeating-linear-gradient(90deg, transparent 0 28px, rgba(255, 122, 24, 0.08) 28px 30px);
    }

    .intro::after {
      bottom: 10vh;
      height: 18vh;
      background:
        linear-gradient(135deg, transparent 0 46%, rgba(37, 20, 9, 0.95) 46% 52%, transparent 52%),
        linear-gradient(45deg, transparent 0 46%, rgba(60, 28, 11, 0.95) 46% 52%, transparent 52%);
      width: min(18rem, 52vw);
      left: 50%;
      right: auto;
      transform: translateX(-50%);
      image-rendering: pixelated;
    }

    body.fire-lit .intro::before,
    body.fire-lit .intro::after {
      opacity: 1;
    }

    .story-line {
      width: min(88vw, 42rem);
      min-height: 7.5em;
      display: grid;
      place-items: center;
      padding: 0 1rem;
      color: #fff;
      text-align: center;
      white-space: pre-line;
      font-family: var(--pixel);
      font-size: clamp(0.82rem, 1.85vw, 1.45rem);
      line-height: 2;
      text-shadow:
        0 0 0.18rem rgba(255, 255, 255, 0.54),
        0 0 1.4rem rgba(255, 122, 24, 0.13);
      opacity: 0;
      transform: translateY(-2vh);
      transition: opacity 520ms ease, transform 520ms ease, color 800ms ease, text-shadow 800ms ease;
    }

    .story-line.visible {
      opacity: 1;
      transform: translateY(-3vh);
    }

    body.fire-lit .story-line {
      color: #fff7df;
      text-shadow:
        0 0 0.16rem rgba(255, 255, 255, 0.52),
        0 0 1.3rem rgba(255, 122, 24, 0.34),
        0 0 4rem rgba(255, 122, 24, 0.14);
    }

    .intro-hint {
      position: fixed;
      top: clamp(1rem, 3vw, 2.8rem);
      right: clamp(1rem, 4vw, 3.2rem);
      display: flex;
      align-items: center;
      gap: 0.7rem;
      color: rgba(255, 255, 255, 0.64);
      font-size: clamp(0.58rem, 1.1vw, 0.9rem);
      line-height: 1.6;
      text-shadow: 0 0 1rem rgba(255, 255, 255, 0.22);
      opacity: 1;
      transform: translateY(0);
      transition: opacity 650ms ease, transform 650ms ease;
    }

    body.intro-hint-hidden .intro-hint {
      opacity: 0;
      transform: translateY(-0.45rem);
      pointer-events: none;
    }

    .key {
      display: inline-grid;
      place-items: center;
      min-width: 2.35em;
      height: 2em;
      padding: 0 0.55em;
      color: #17191f;
      background: #f4f4f6;
      border: 3px solid #9aa1af;
      box-shadow:
        inset -3px -3px 0 #c7cbd3,
        inset 3px 3px 0 #fff,
        0 3px 0 #606879;
      text-shadow: none;
    }

    .skip-intro {
      position: fixed;
      right: clamp(1rem, 4vw, 3.2rem);
      bottom: clamp(1rem, 4vw, 2.6rem);
      display: inline-grid;
      place-items: center;
      width: 3rem;
      height: 3rem;
      color: #f9f8ff;
      background: rgba(15, 20, 34, 0.72);
      border: 2px solid #7f8ba2;
      box-shadow: inset -3px -3px 0 rgba(0, 0, 0, 0.35), 0 0 1rem rgba(255, 198, 64, 0.12);
      cursor: pointer;
    }

    .skip-intro:focus-visible,
    .home-cta:focus-visible,
    .nav-button:focus-visible,
    .setup-action:focus-visible,
    .tutorial-action:focus-visible,
    .setup-field input:focus-visible {
      outline: 3px solid var(--gold);
      outline-offset: 4px;
    }

    .home {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      opacity: 0;
      transform: translateY(0.8rem);
      transition: opacity 1.2s ease 350ms, transform 1.2s ease 350ms;
      pointer-events: none;
    }

    body.intro-done .home {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    body.camp-setup .home {
      opacity: 0;
      transform: translateY(-0.6rem);
      pointer-events: none;
      transition-delay: 0ms;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: clamp(0.75rem, 2vw, 1.2rem) clamp(1rem, 4vw, 3.3rem);
      background: linear-gradient(rgba(4, 5, 12, 0.82), rgba(4, 5, 12, 0.32), transparent);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      color: #fff7df;
      font-size: clamp(0.8rem, 1.7vw, 1.1rem);
      text-shadow: 0 0 1rem rgba(255, 122, 24, 0.4);
    }

    .brand-mark {
      width: 1.9rem;
      height: 1.9rem;
      position: relative;
      image-rendering: pixelated;
      background:
        linear-gradient(45deg, transparent 0 30%, var(--ember) 30% 70%, transparent 70%),
        linear-gradient(135deg, transparent 0 30%, var(--gold) 30% 72%, transparent 72%);
      filter: drop-shadow(0 0 0.65rem rgba(255, 122, 24, 0.7));
    }

    .nav {
      display: flex;
      align-items: center;
      gap: clamp(0.65rem, 2vw, 2rem);
      color: rgba(255, 242, 206, 0.72);
      font-size: clamp(0.55rem, 1vw, 0.76rem);
    }

    .nav span {
      white-space: nowrap;
    }

    .nav-button {
      color: #17120b;
      background: var(--gold);
      border: 3px solid #402100;
      padding: 0.75rem 1rem;
      box-shadow:
        inset -4px -4px 0 #b95d08,
        inset 4px 4px 0 #ffe385,
        0 4px 0 #3a1d00;
      cursor: pointer;
    }

    .hero-copy {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: grid;
      place-items: center;
      padding: 11vh 1.2rem 18vh;
      text-align: center;
      pointer-events: none;
    }

    .hero-copy-inner {
      width: min(68rem, 94vw);
      transform: translateY(-6vh);
    }

    .kicker {
      margin: 0 0 1.2rem;
      color: #ffc46a;
      font-size: clamp(0.58rem, 1.3vw, 0.82rem);
      text-shadow: 0 0 1rem rgba(255, 122, 24, 0.45);
    }

    h1 {
      margin: 0;
      color: #fff3c6;
      font-size: clamp(2.6rem, 7.6vw, 7rem);
      line-height: 0.95;
      text-align: center;
      white-space: nowrap;
      text-shadow:
        0 5px 0 #2b0f00,
        0 0 1.6rem rgba(255, 122, 24, 0.55),
        0 0 5rem rgba(255, 122, 24, 0.25);
    }

    .tagline {
      max-width: 42rem;
      margin: 1.35rem auto 0;
      color: rgba(255, 242, 206, 0.88);
      font-family: var(--readable-pixel);
      font-size: clamp(1.35rem, 3.1vw, 2.35rem);
      line-height: 1.1;
      text-shadow: 0 0 1.5rem rgba(0, 0, 0, 0.95);
    }

    .home-cta {
      position: fixed;
      left: 50%;
      bottom: clamp(2rem, 6vh, 4.5rem);
      z-index: 4;
      transform: translateX(-50%);
      padding: 1rem 1.25rem;
      min-width: min(21rem, calc(100vw - 2rem));
      color: #220f00;
      background: linear-gradient(#f4b945, #e89122);
      border: 4px solid #2e1305;
      box-shadow:
        inset -5px -5px 0 #8d3a08,
        inset 5px 5px 0 #ffd06b,
        0 5px 0 #1f0c02,
        0 0 1.35rem rgba(255, 122, 24, 0.28);
      cursor: pointer;
      pointer-events: auto;
      white-space: nowrap;
    }

    .nav-button:active {
      transform: translateY(3px);
      box-shadow:
        inset -4px -4px 0 #b65305,
        inset 4px 4px 0 #ffe38a,
        0 2px 0 #311400,
        0 0 2rem rgba(255, 122, 24, 0.35);
    }

    .home-cta:active {
      transform: translateX(-50%) translateY(3px);
      box-shadow:
        inset -4px -4px 0 #7c3206,
        inset 4px 4px 0 #ffc45b,
        0 2px 0 #1f0c02,
        0 0 1rem rgba(255, 122, 24, 0.24);
    }

    .camp-prompt {
      position: fixed;
      left: 50%;
      bottom: clamp(6.4rem, 14vh, 9rem);
      z-index: 4;
      transform: translateX(-50%);
      color: #ff8a20;
      font-size: clamp(0.58rem, 1vw, 0.78rem);
      text-shadow: 0 0 0.8rem rgba(255, 122, 24, 0.8);
      pointer-events: none;
    }

    .ambient-vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 68%, transparent 0 20rem, rgba(1, 2, 7, 0.28) 34rem),
        linear-gradient(90deg, rgba(0, 0, 0, 0.45), transparent 18%, transparent 82%, rgba(0, 0, 0, 0.48)),
        linear-gradient(transparent 0 70%, rgba(0, 0, 0, 0.5));
    }

    body.camp-setup .scene-canvas {
      opacity: 1;
      transform: scale(1.16) translateY(-1vh);
      transition-duration: 1.4s;
    }

    body.camp-setup .ambient-vignette {
      background:
        radial-gradient(circle at 50% 58%, transparent 0 15rem, rgba(1, 2, 7, 0.32) 32rem),
        linear-gradient(90deg, rgba(0, 0, 0, 0.62), transparent 22%, transparent 78%, rgba(0, 0, 0, 0.62)),
        linear-gradient(rgba(0, 0, 0, 0.18), transparent 34%, rgba(0, 0, 0, 0.58));
    }

    .camp-stage {
      position: fixed;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      padding: clamp(1rem, 4vw, 3rem);
      opacity: 0;
      visibility: hidden;
      transform: translateY(1rem);
      transition: opacity 900ms ease, visibility 900ms ease, transform 900ms ease;
      pointer-events: none;
    }

    body.camp-setup .camp-stage {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
      pointer-events: auto;
    }

    .setup-panel {
      width: min(31rem, calc(100vw - 2rem));
      padding: 1.2rem;
      color: #fff3d2;
      background:
        linear-gradient(rgba(24, 16, 10, 0.9), rgba(9, 12, 20, 0.88)),
        repeating-linear-gradient(90deg, rgba(255, 138, 32, 0.08) 0 2px, transparent 2px 18px);
      border: 3px solid #5d2a0d;
      box-shadow:
        inset -5px -5px 0 rgba(0, 0, 0, 0.42),
        inset 5px 5px 0 rgba(255, 185, 82, 0.16),
        0 0 0 3px rgba(13, 6, 2, 0.9),
        0 1rem 4rem rgba(0, 0, 0, 0.65),
        0 0 3rem rgba(255, 104, 18, 0.18);
      image-rendering: pixelated;
    }

    .setup-panel {
      display: grid;
      gap: 1rem;
    }

    body.setup-complete .setup-panel {
      display: none;
    }

    .tutorial-panel {
      display: none;
      place-items: center;
      width: min(24rem, calc(100vw - 2rem));
    }

    body.setup-complete .tutorial-panel {
      display: grid;
    }

    .setup-title {
      margin: 0;
      color: #ffc46a;
      font-size: clamp(0.82rem, 2vw, 1.08rem);
      line-height: 1.6;
      text-shadow: 0 0 1rem rgba(255, 122, 24, 0.45);
    }

    .setup-copy {
      margin: 0;
      color: rgba(255, 242, 206, 0.8);
      font-family: var(--readable-pixel);
      font-size: clamp(1.15rem, 3vw, 1.55rem);
      line-height: 1.1;
    }

    .setup-form {
      display: grid;
      gap: 0.85rem;
      margin-top: 0.2rem;
    }

    .setup-field {
      display: grid;
      gap: 0.35rem;
      color: rgba(255, 242, 206, 0.68);
      font-size: 0.58rem;
      line-height: 1.6;
    }

    .setup-field input {
      width: 100%;
      min-height: 3.1rem;
      padding: 0.75rem;
      color: #fff7df;
      background: rgba(2, 5, 12, 0.78);
      border: 3px solid #1c3441;
      box-shadow:
        inset 4px 4px 0 rgba(0, 0, 0, 0.42),
        inset -4px -4px 0 rgba(74, 111, 109, 0.18);
      font-family: var(--pixel);
      font-size: 0.7rem;
      letter-spacing: 0;
      outline: none;
    }

    .setup-field input:focus {
      border-color: #ff9a2e;
      box-shadow:
        inset 4px 4px 0 rgba(0, 0, 0, 0.42),
        0 0 0 3px rgba(255, 154, 46, 0.24),
        0 0 1.3rem rgba(255, 122, 24, 0.28);
    }

    .setup-feedback {
      min-height: 1.2rem;
      margin: -0.1rem 0 0;
      color: #ffd889;
      font-family: var(--readable-pixel);
      font-size: clamp(1.05rem, 2.5vw, 1.35rem);
      line-height: 1.05;
      text-shadow: 0 0 0.85rem rgba(255, 122, 24, 0.25);
    }

    .setup-feedback.error {
      color: #ff8f70;
    }

    .setup-feedback.success {
      color: #fff2ce;
    }

    .setup-action,
    .tutorial-action {
      width: 100%;
      min-height: 3.25rem;
      margin-top: 0.25rem;
      color: #1f0c02;
      background: linear-gradient(#f4b945, #e89122);
      border: 4px solid #2e1305;
      box-shadow:
        inset -5px -5px 0 #8d3a08,
        inset 5px 5px 0 #ffd06b,
        0 5px 0 #1f0c02,
        0 0 1.35rem rgba(255, 122, 24, 0.28);
      cursor: pointer;
    }

    .setup-action:disabled,
    .tutorial-action:disabled {
      opacity: 0.65;
      cursor: progress;
    }

    .setup-action:active,
    .tutorial-action:active {
      transform: translateY(3px);
      box-shadow:
        inset -4px -4px 0 #7c3206,
        inset 4px 4px 0 #ffc45b,
        0 2px 0 #1f0c02,
        0 0 1rem rgba(255, 122, 24, 0.24);
    }

    .tutorial-action {
      width: min(22rem, 100%);
      margin-top: 0;
    }

    @media (max-width: 760px) {
      body {
        overflow: hidden;
      }

      .intro-hint {
        left: 1rem;
        right: 1rem;
        justify-content: center;
        text-align: center;
      }

      .story-line {
        font-size: clamp(0.68rem, 3.2vw, 0.98rem);
        width: min(92vw, 28rem);
        line-height: 2.1;
      }

      .topbar {
        align-items: flex-start;
      }

      .nav span {
        display: none;
      }

      .nav-button {
        padding: 0.7rem 0.8rem;
        font-size: 0.58rem;
      }

      .hero-copy {
        padding-top: 13vh;
      }

      .hero-copy-inner {
        width: min(30rem, 94vw);
        transform: translateY(-6vh);
      }

      h1 {
        font-size: clamp(2.3rem, 12vw, 4.25rem);
      }

      .tagline {
        width: min(24rem, 90vw);
      }

      .home-cta {
        font-size: 0.64rem;
        padding-inline: 0.85rem;
      }

      .setup-panel {
        padding: 1rem;
      }

      .setup-field input {
        min-height: 2.9rem;
        font-size: 0.62rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body class="home-ready fire-lit intro-done">
  <main class="site" aria-label="Firelight">
    <canvas class="scene-canvas" id="scene-canvas" aria-hidden="true"></canvas>
    <div class="ambient-vignette" aria-hidden="true"></div>
    <canvas class="fire-canvas" id="fire-canvas" aria-hidden="true"></canvas>

    <section class="home" aria-label="Firelight homepage">
      <header class="topbar">
        <div class="brand" aria-label="Firelight">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>Firelight</span>
        </div>
        <nav class="nav" aria-label="Primary navigation">
          <span>Learn</span>
          <span>Kits</span>
          <span>Build</span>
          <span>Community</span>
          <button class="nav-button" type="button" id="buy-kit">Buy a Kit!</button>
        </nav>
      </header>

      <div class="hero-copy">
        <div class="hero-copy-inner">
          <p class="kicker">Welcome to the campfire of inventors.</p>
          <h1>Firelight</h1>
          <p class="tagline">Learn electronics, code, and robotics by building real things.</p>
        </div>
      </div>

      <div class="camp-prompt">Pull up a log.</div>
      <button class="home-cta" type="button" id="begin-story">Begin the first spark</button>
    </section>

    <section class="intro" aria-label="Firelight opening story">
      <div class="intro-hint" aria-hidden="true">
        <span>Press</span>
        <span class="key">Space</span>
        <span>or</span>
        <span class="key">Enter</span>
      </div>
      <p class="story-line" id="story-line" aria-live="polite"></p>
      <button class="skip-intro" type="button" id="skip-intro" aria-label="Skip intro">>>></button>
    </section>

    <section class="camp-stage" aria-label="Firelight campsite setup">
      <div class="setup-panel">
        <p class="setup-title">Set Up Camp</p>
        <p class="setup-copy">Sign in, claim your kit, and keep your first build waiting by the fire.</p>
        <form class="setup-form" id="setup-form">
          <label class="setup-field">
            Name
            <input id="setup-name" name="name" type="text" autocomplete="name" required />
          </label>
          <label class="setup-field">
            Email
            <input id="setup-email" name="email" type="email" autocomplete="email" required />
          </label>
          <label class="setup-field">
            Kit Code
            <input id="setup-code" name="kit-code" type="text" autocomplete="off" required />
          </label>
          <p class="setup-feedback" id="setup-feedback" aria-live="polite"></p>
          <button class="setup-action" type="submit">Light the camp!</button>
        </form>
      </div>

      <div class="tutorial-panel" aria-live="polite">
        <button class="tutorial-action" type="button">Start tutorial</button>
      </div>
    </section>
  </main>

  <script>
    window.FIRELIGHT_CONFIG = {
      kitKey: "123456",
      supabaseUrl: "",
      supabaseAnonKey: ""
    };
  </script>
  <script src="/config"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const story = [
      "Before computers,\nbefore electricity,\nbefore engines...",
      "There was fire.",
      "For thousands of years,\npeople gathered around it.",
      "Not just for warmth.",
      "To share ideas.\nTo solve problems.\nTo teach.",
      "Every invention starts small.",
      "A question.\nA spark.\nSomeone willing to try.",
      "One person shares what they know.",
      "Another person builds on it.",
      "The tools have changed.",
      "The fire hasn't.",
      "Today,\nwe gather around screens.",
      "We write code.\nWe wire circuits.\nWe bring machines to life.",
      "Learn.",
      "Build.",
      "Create.",
      "Welcome to Firelight."
    ];

    const body = document.body;
    const lineEl = document.getElementById("story-line");
    const skipButton = document.getElementById("skip-intro");
    const beginStoryButton = document.getElementById("begin-story");
    const buyKitButton = document.getElementById("buy-kit");
    const setupForm = document.getElementById("setup-form");
    const setupFeedback = document.getElementById("setup-feedback");
    const setupAction = document.querySelector(".setup-action");
    const tutorialAction = document.querySelector(".tutorial-action");
    const firelightConfig = window.FIRELIGHT_CONFIG || {};
    const requiredKitKey = String(firelightConfig.kitKey || "123456").trim();
    const supabaseClient = firelightConfig.supabaseUrl && firelightConfig.supabaseAnonKey && window.supabase
      ? window.supabase.createClient(firelightConfig.supabaseUrl, firelightConfig.supabaseAnonKey)
      : null;
    let index = -1;
    let timer = null;
    let typingTimer = null;
    let hintTimer = null;
    let charIndex = 0;
    let currentLine = "";
    let isTyping = false;
    let introActive = false;

    function clearStoryTimers() {
      clearTimeout(timer);
      clearTimeout(typingTimer);
      clearTimeout(hintTimer);
    }

    function holdDelay(line) {
      if (!line) return 1300;
      if (line.length <= 8) return 1550;
      return Math.min(2600, 1350 + line.length * 18);
    }

    function typeCurrentLine() {
      if (!introActive) return;
      isTyping = true;
      charIndex += 1;
      lineEl.textContent = currentLine.slice(0, charIndex);

      if (charIndex < currentLine.length) {
        const previousChar = currentLine[charIndex - 1] || "";
        const pause = previousChar === "." || previousChar === "," ? 110 : 46;
        typingTimer = window.setTimeout(typeCurrentLine, pause);
        return;
      }

      isTyping = false;
      timer = window.setTimeout(showNextLine, holdDelay(currentLine));
    }

    function completeCurrentLine() {
      clearTimeout(typingTimer);
      clearTimeout(timer);
      lineEl.textContent = currentLine;
      charIndex = currentLine.length;
      isTyping = false;
      timer = window.setTimeout(showNextLine, Math.min(1200, holdDelay(currentLine) * 0.5));
    }

    function showNextLine() {
      if (!introActive) return;
      clearStoryTimers();
      index += 1;

      if (index >= story.length) {
        finishIntro();
        return;
      }

      currentLine = story[index];
      charIndex = 0;
      lineEl.textContent = "";
      lineEl.classList.add("visible");
      typingTimer = window.setTimeout(typeCurrentLine, 260);
    }

    function finishIntro() {
      introActive = false;
      clearStoryTimers();
      body.classList.add("fire-lit", "home-ready", "intro-done", "intro-hint-hidden", "camp-setup");
      body.classList.remove("setup-complete");
      lineEl.classList.remove("visible");
      lineEl.textContent = "";
    }

    function startIntro() {
      clearStoryTimers();
      introActive = true;
      index = -1;
      charIndex = 0;
      currentLine = "";
      lineEl.textContent = "";
      lineEl.classList.remove("visible");
      body.classList.remove("intro-done", "intro-hint-hidden", "camp-setup", "setup-complete");
      body.classList.add("fire-lit", "home-ready");
      hintTimer = window.setTimeout(() => {
        body.classList.add("intro-hint-hidden");
      }, 1000);
      timer = window.setTimeout(showNextLine, 950);
    }

    window.addEventListener("keydown", (event) => {
      if (!introActive) return;
      const key = event.key;
      if (key === " " || key === "Enter") {
        event.preventDefault();
        if (isTyping) {
          completeCurrentLine();
        } else {
          showNextLine();
        }
      } else if (key.toLowerCase() === "s" || key === "Escape") {
        finishIntro();
      }
    });

    function setSetupFeedback(message, type = "") {
      setupFeedback.textContent = message;
      setupFeedback.className = `setup-feedback${type ? ` ${type}` : ""}`;
    }

    function unlockTutorial() {
      body.classList.add("setup-complete");
      tutorialAction.focus();
    }

    async function signIntoFirelight(email, kitCode, name) {
      if (!supabaseClient) {
        window.localStorage.setItem("firelight-kit-unlocked", "true");
        window.localStorage.setItem("firelight-student-email", email);
        window.localStorage.setItem("firelight-student-name", name);
        return;
      }

      const password = kitCode;
      let result = await supabaseClient.auth.signInWithPassword({ email, password });

      if (result.error) {
        result = await supabaseClient.auth.signUp({
          email,
          password,
          options: {
            data: {
              name,
              kit_code: kitCode
            }
          }
        });
      }

      if (result.error) {
        throw result.error;
      }
    }

    skipButton.addEventListener("click", finishIntro);
    beginStoryButton.addEventListener("click", startIntro);
    buyKitButton.addEventListener("click", () => {
      window.location.href = "./product.html";
    });
    setupForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const formData = new FormData(setupForm);
      const name = String(formData.get("name") || "").trim();
      const email = String(formData.get("email") || "").trim().toLowerCase();
      const kitCode = String(formData.get("kit-code") || "").trim();

      if (kitCode !== requiredKitKey) {
        setSetupFeedback("That kit code is not lit yet. Try 123456.", "error");
        return;
      }

      setupAction.disabled = true;
      setupAction.textContent = "Lighting...";
      window.localStorage.setItem("firelight-student-name", name);
      window.localStorage.setItem("firelight-student-email", email);
      setSetupFeedback(supabaseClient ? "Checking your Firelight kit..." : "Camp lit locally. Supabase keys can be added on Cloudflare.", "");

      try {
        await signIntoFirelight(email, kitCode, name);
        setSetupFeedback("Camp lit. Welcome to Firelight.", "success");
        window.setTimeout(unlockTutorial, 450);
      } catch (error) {
        setupAction.disabled = false;
        setupAction.textContent = "Light the camp!";
        setSetupFeedback(error.message || "Could not light the camp yet.", "error");
      }
    });
    tutorialAction.addEventListener("click", () => {
      window.location.href = "./tutorial.html";
    });

    function setupFireShader() {
      const canvas = document.getElementById("fire-canvas");
      const gl = canvas.getContext("webgl", {
        alpha: true,
        premultipliedAlpha: false,
        antialias: false
      }) || canvas.getContext("experimental-webgl");

      if (!gl) return;

      function syncSize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const width = Math.max(1, Math.floor(canvas.clientWidth * dpr));
        const height = Math.max(1, Math.floor(canvas.clientHeight * dpr));
        if (canvas.width !== width || canvas.height !== height) {
          canvas.width = width;
          canvas.height = height;
        }
      }

      if (typeof ResizeObserver !== "undefined") {
        new ResizeObserver(syncSize).observe(canvas);
      }
      syncSize();

      const vertexShaderSource = `
        attribute vec2 a_position;
        varying vec2 v_texCoord;
        void main() {
          v_texCoord = a_position * 0.5 + 0.5;
          gl_Position = vec4(a_position, 0.0, 1.0);
        }
      `;

      const fragmentShaderSource = `
        precision highp float;
        varying vec2 v_texCoord;
        uniform float u_time;
        uniform vec2 u_resolution;
        uniform vec2 u_mouse;

        float noise(vec2 p) {
          return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
        }

        float snoise(vec2 p) {
          vec2 i = floor(p);
          vec2 f = fract(p);
          f = f * f * (3.0 - 2.0 * f);
          float a = noise(i);
          float b = noise(i + vec2(1.0, 0.0));
          float c = noise(i + vec2(0.0, 1.0));
          float d = noise(i + vec2(1.0, 1.0));
          return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
        }

        float fire(vec2 p) {
          float n = snoise(p * 2.0 + vec2(0.0, -u_time * 2.0));
          n += snoise(p * 4.0 + vec2(0.0, -u_time * 4.0)) * 0.5;
          n += snoise(p * 8.0 + vec2(0.0, -u_time * 8.0)) * 0.25;
          return n;
        }

        void main() {
          vec2 uv = v_texCoord;
          vec2 mouse = u_mouse / u_resolution;
          vec2 fire_pos = vec2(0.5, 0.18);
          fire_pos += (mouse - 0.5) * 0.018;

          float dist = distance(uv, fire_pos);
          float f = fire(uv * vec2(2.0, 1.0));
          float mask = smoothstep(0.34, 0.0, dist + f * 0.085);
          float flame = smoothstep(0.58, 0.0, abs(uv.x - fire_pos.x) * 4.1 + (uv.y - fire_pos.y) * 1.72 - f * 0.26);
          mask *= flame;

          vec3 color_core = vec3(1.0, 0.84, 0.38);
          vec3 color_mid = vec3(1.0, 0.34, 0.02);
          vec3 color_outer = vec3(0.72, 0.08, 0.0);
          vec3 flame_color = mix(color_outer, color_mid, mask);
          flame_color = mix(flame_color, color_core, pow(mask, 2.7));

          float embers = 0.0;
          for(int i = 0; i < 12; i++) {
            float fi = float(i);
            float t = u_time * (0.45 + fi * 0.015) + fi * 1.37;
            vec2 e_pos = vec2(
              fire_pos.x + sin(t * 2.0 + fi) * (0.035 + fi * 0.006),
              fire_pos.y + fract(t * 0.22 + fi * 0.11) * 0.5
            );
            float e_dist = distance(uv, e_pos);
            embers += smoothstep(0.01, 0.0, e_dist) * (1.0 - smoothstep(0.25, 0.72, e_pos.y));
          }

          float glow = smoothstep(0.62, 0.0, dist) * 0.45;
          float low_glow = smoothstep(0.7, 0.0, distance(uv, vec2(0.5, 0.12))) * 0.25;
          vec3 glow_color = (glow + low_glow) * vec3(1.0, 0.28, 0.03);
          vec3 final_color = glow_color + flame_color * mask + embers * vec3(1.0, 0.55, 0.12);
          float alpha = clamp(mask + embers + glow * 0.45 + low_glow * 0.28, 0.0, 0.92);

          gl_FragColor = vec4(final_color, alpha);
        }
      `;

      function compileShader(type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          console.warn(gl.getShaderInfoLog(shader));
        }
        return shader;
      }

      const program = gl.createProgram();
      gl.attachShader(program, compileShader(gl.VERTEX_SHADER, vertexShaderSource));
      gl.attachShader(program, compileShader(gl.FRAGMENT_SHADER, fragmentShaderSource));
      gl.linkProgram(program);
      gl.useProgram(program);

      const buffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);

      const position = gl.getAttribLocation(program, "a_position");
      gl.enableVertexAttribArray(position);
      gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);

      const uTime = gl.getUniformLocation(program, "u_time");
      const uResolution = gl.getUniformLocation(program, "u_resolution");
      const uMouse = gl.getUniformLocation(program, "u_mouse");
      let mouse = { x: canvas.width / 2, y: canvas.height / 2 };

      window.addEventListener("mousemove", (event) => {
        const rect = canvas.getBoundingClientRect();
        if (!rect.width || !rect.height) return;
        const nx = (event.clientX - rect.left) / rect.width;
        const ny = 1 - (event.clientY - rect.top) / rect.height;
        mouse.x = nx * canvas.width;
        mouse.y = ny * canvas.height;
      });

      function render(time) {
        syncSize();
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clearColor(0, 0, 0, 0);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.uniform1f(uTime, time * 0.001);
        gl.uniform2f(uResolution, canvas.width, canvas.height);
        gl.uniform2f(uMouse, mouse.x, mouse.y);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        requestAnimationFrame(render);
      }

      requestAnimationFrame(render);
    }

    function setupSceneCanvas() {
      const canvas = document.getElementById("scene-canvas");
      const ctx = canvas.getContext("2d");
      const baseWidth = 360;
      const baseHeight = 202;
      let animation = 0;

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.floor(canvas.clientWidth * dpr);
        canvas.height = Math.floor(canvas.clientHeight * dpr);
        draw();
      }

      function px(x, y, w, h, color) {
        ctx.fillStyle = color;
        ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
      }

      function poly(points, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(points[0][0], points[0][1]);
        for (let i = 1; i < points.length; i += 1) ctx.lineTo(points[i][0], points[i][1]);
        ctx.closePath();
        ctx.fill();
      }

      function tree(x, y, scale, dark) {
        const trunk = dark ? "#27180e" : "#3a2416";
        const leaf1 = dark ? "#092220" : "#123b34";
        const leaf2 = dark ? "#0d302b" : "#1b4f41";
        px(x - 2 * scale, y - 24 * scale, 4 * scale, 28 * scale, trunk);
        poly([[x, y - 66 * scale], [x - 22 * scale, y - 28 * scale], [x + 22 * scale, y - 28 * scale]], leaf1);
        poly([[x, y - 52 * scale], [x - 27 * scale, y - 12 * scale], [x + 27 * scale, y - 12 * scale]], leaf2);
        poly([[x, y - 34 * scale], [x - 20 * scale, y + 4 * scale], [x + 20 * scale, y + 4 * scale]], leaf1);
      }

      function drawComputer(x, y) {
        px(x, y, 25, 18, "#8d98a8");
        px(x + 3, y + 3, 19, 12, "#1b2028");
        px(x + 6, y + 5, 13, 8, "#283b4a");
        px(x + 5, y + 20, 17, 6, "#6b7482");
        px(x + 1, y + 26, 26, 6, "#55606e");
        px(x + 22, y + 28, 3, 3, "#a760bc");
      }

      function drawTent(x, y) {
        poly([[x, y], [x + 38, y - 35], [x + 76, y]], "#6d331b");
        poly([[x + 8, y - 2], [x + 38, y - 29], [x + 68, y - 2]], "#c06125");
        poly([[x + 28, y], [x + 42, y - 20], [x + 52, y]], "#211410");
        px(x + 11, y - 6, 4, 4, "#f29b2d");
        px(x + 61, y - 6, 4, 4, "#f29b2d");
      }

      function drawBench(x, y, flip) {
        const direction = flip ? -1 : 1;
        px(x, y, 48 * direction, 5, "#7a431f");
        px(x + 4 * direction, y + 6, 42 * direction, 4, "#4b2a18");
        px(x + 10 * direction, y + 10, 4 * direction, 14, "#29170e");
        px(x + 35 * direction, y + 10, 4 * direction, 14, "#29170e");
      }

      function drawBackpack(x, y) {
        px(x, y, 19, 27, "#8f4026");
        px(x + 3, y - 6, 13, 8, "#6e2f20");
        px(x + 4, y + 7, 11, 7, "#b7562c");
        px(x + 15, y + 9, 5, 12, "#4b2719");
      }

      function drawCampfire(x, y) {
        px(x - 18, y + 9, 36, 5, "#2d180c");
        px(x - 22, y + 12, 18, 4, "#5b2c12");
        px(x + 4, y + 12, 18, 4, "#5b2c12");
        px(x - 2, y - 9 + Math.round(Math.sin(animation / 10) * 2), 5, 17, "#fff0a6");
        px(x - 8, y - 4 + Math.round(Math.cos(animation / 9) * 2), 8, 18, "#ff8a19");
        px(x + 2, y - 2 + Math.round(Math.sin(animation / 8) * 2), 8, 16, "#f44313");
        px(x - 4, y - 17, 7, 10, "#ffc93f");
      }

      function draw() {
        const scale = Math.max(canvas.width / baseWidth, canvas.height / baseHeight);
        const width = canvas.width / scale;
        const height = canvas.height / scale;
        const offsetX = (baseWidth - width) / 2;
        const offsetY = (baseHeight - height) / 2;

        ctx.save();
        ctx.imageSmoothingEnabled = false;
        ctx.setTransform(scale, 0, 0, scale, -offsetX * scale, -offsetY * scale);
        ctx.clearRect(0, 0, baseWidth, baseHeight);

        const gradient = ctx.createLinearGradient(0, 0, 0, baseHeight);
        gradient.addColorStop(0, "#050918");
        gradient.addColorStop(0.52, "#102b46");
        gradient.addColorStop(1, "#101410");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, baseWidth, baseHeight);

        for (let i = 0; i < 74; i += 1) {
          const x = (i * 47) % baseWidth;
          const y = 8 + ((i * 29) % 73);
          const twinkle = (i + Math.floor(animation / 18)) % 5 === 0;
          px(x, y, twinkle ? 2 : 1, twinkle ? 2 : 1, twinkle ? "#fff0bd" : "#5b7392");
        }

        poly([[0, 108], [42, 48], [87, 110]], "#0b2133");
        poly([[58, 118], [124, 44], [184, 118]], "#12314d");
        poly([[145, 112], [213, 58], [276, 112]], "#0d2942");
        poly([[238, 116], [314, 44], [382, 116]], "#102d45");
        poly([[42, 48], [54, 67], [32, 67]], "#284d62");
        poly([[124, 44], [141, 66], [105, 66]], "#315d70");
        poly([[314, 44], [330, 68], [294, 68]], "#2b5367");

        px(0, 108, 360, 94, "#0c1e1b");
        poly([[0, 139], [70, 124], [134, 135], [202, 119], [280, 132], [360, 120], [360, 202], [0, 202]], "#173b32");
        poly([[0, 160], [44, 147], [102, 154], [181, 143], [252, 154], [360, 145], [360, 202], [0, 202]], "#244a3c");
        poly([[0, 178], [83, 168], [151, 177], [225, 163], [288, 174], [360, 166], [360, 202], [0, 202]], "#1b332c");

        tree(14, 142, 0.78, true);
        tree(49, 136, 0.7, true);
        tree(314, 142, 0.85, true);
        tree(342, 137, 0.65, true);
        tree(276, 136, 0.56, false);
        tree(112, 138, 0.46, false);

        drawTent(29, 154);
        drawComputer(41, 158);
        drawBench(104, 161, false);
        drawBench(255, 161, true);
        drawBackpack(306, 158);
        drawCampfire(180, 161);

        px(0, 195, baseWidth, 7, "#030509");
        ctx.restore();
      }

      function animate() {
        animation += 1;
        draw();
        requestAnimationFrame(animate);
      }

      window.addEventListener("resize", resize);
      resize();
      animate();
    }

    setupSceneCanvas();
    setupFireShader();
  </script>
</body>
</html>
